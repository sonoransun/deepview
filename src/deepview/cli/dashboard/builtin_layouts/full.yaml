# Everything-at-once dashboard layout.

refresh_hz: 4

trace:
  probes: [process, network, filesystem]

layout:
  root:
    direction: vertical
    children:
      - {id: top, size: 3}
      - id: upper
        direction: horizontal
        children:
          - {id: upper-left, ratio: 1}
          - {id: upper-right, ratio: 1}
      - id: middle
        direction: horizontal
        children:
          - {id: middle-left, ratio: 2}
          - {id: middle-right, ratio: 1}
      - id: bottom
        direction: horizontal
        children:
          - {id: bottom-left, ratio: 1}
          - {id: bottom-right, ratio: 2}

panels:
  - name: header
    type: header
    region: top

  - name: flow
    type: flow_rate
    region: upper-left
    window_s: 60

  - name: top_procs
    type: process_top
    region: upper-right
    top_n: 10

  - name: connections
    type: connections
    region: middle-left
    max_rows: 15

  - name: top_talkers
    type: top_talkers
    region: middle-right
    top_n: 10

  - name: alerts
    type: alerts
    region: bottom-left
    max_rows: 8

  - name: events
    type: event_tail
    region: bottom-right
    max_rows: 12
