<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img"
     aria-labelledby="ufp-title ufp-desc">
  <title id="ufp-title">KDF iteration progress and key-unlock pulse</title>
  <desc id="ufp-desc">
    A circular progress arc representing a Passphrase KeySource driving PBKDF2
    iterations from 0 to 1000. The arc fills clockwise over five seconds via
    stroke-dashoffset keyframes. Inside the circle an iteration counter
    cycles 0 through 1000 via staggered text opacity. At completion a key
    icon in the centre briefly glows before the loop restarts.
    Rendered statically the diagram shows an empty arc and the resting
    counter value, which is still a readable representation of the
    unlock-in-progress state.
  </desc>

  <defs>
    <style><![CDATA[
      .bg        { fill: #1e1e2e; }
      .lbl       { fill: #cdd6f4; font-family: 'Fira Sans', 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; }
      .sub       { fill: #a6adc8; font-family: 'Fira Mono', monospace; font-size: 12px; }
      .count     { fill: #94e2d5; font-family: 'Fira Mono', monospace; font-size: 30px; font-weight: 700; }

      /* Progress ring — circumference 2*pi*80 ~ 502.65; use 503 as a
         comfortable round number for stroke-dasharray. */
      .track     { fill: none; stroke: #313244; stroke-width: 16; }
      .progress  {
        fill: none;
        stroke: #cba6f7;
        stroke-width: 16;
        stroke-linecap: round;
        stroke-dasharray: 503;
        stroke-dashoffset: 503;
        transform: rotate(-90deg);
        transform-origin: 200px 170px;
        animation: fillArc 6s infinite ease-in-out;
      }
      @keyframes fillArc {
         0%   { stroke-dashoffset: 503; }
        83%  { stroke-dashoffset: 0;   } /* 0-5s: fill */
        91%  { stroke-dashoffset: 0;   } /* 5-5.5s: held */
       100%  { stroke-dashoffset: 503; } /* 5.5-6s: reset */
      }

      /* Iteration counter: 6 text elements fade in/out in sequence to give
         the illusion of a counting number. Staggered opacity; each only
         visible for ~1 second of the 6-second loop. */
      .c0, .c1, .c2, .c3, .c4, .c5 {
        opacity: 0;
        animation: countStep 6s infinite steps(1);
      }
      .c0 { animation-delay: 0.0s; }
      .c1 { animation-delay: 1.0s; }
      .c2 { animation-delay: 2.0s; }
      .c3 { animation-delay: 3.0s; }
      .c4 { animation-delay: 4.0s; }
      .c5 { animation-delay: 5.0s; }
      @keyframes countStep {
         0%   { opacity: 1; }
        16%  { opacity: 1; }
        17%  { opacity: 0; }
       100%  { opacity: 0; }
      }

      /* Key icon starts invisible; glows briefly at 100% progress (5-5.5s). */
      .keyicon {
        opacity: 0;
        animation: keyGlow 6s infinite ease-in-out;
        transform-origin: 200px 170px;
      }
      @keyframes keyGlow {
         0%   { opacity: 0; transform: scale(0.9); }
        80%  { opacity: 0; transform: scale(0.9); }
        85%  { opacity: 1; transform: scale(1.0); }
        91%  { opacity: 1; transform: scale(1.1); } /* peak */
        95%  { opacity: 0.4; transform: scale(1.0); }
       100%  { opacity: 0; transform: scale(0.9); }
      }

      .keyglow-ring {
        fill: none;
        stroke: #f9e2af;
        stroke-width: 3;
        opacity: 0;
        transform-origin: 200px 170px;
        animation: keyRing 6s infinite ease-out;
      }
      @keyframes keyRing {
         0%   { opacity: 0; transform: scale(0.7); }
        83%  { opacity: 0; transform: scale(0.7); }
        87%  { opacity: 0.9; transform: scale(0.9); }
        95%  { opacity: 0; transform: scale(1.8); }
       100%  { opacity: 0; transform: scale(1.8); }
      }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="400" height="340"/>

  <!-- Title -->
  <text class="lbl" x="200" y="30" text-anchor="middle">PBKDF2 iteration progress</text>
  <text class="sub" x="200" y="50" text-anchor="middle">Passphrase -&gt; OffloadEngine -&gt; key</text>

  <!-- Progress ring: track + animated stroke -->
  <circle class="track"    cx="200" cy="170" r="80"/>
  <circle class="progress" cx="200" cy="170" r="80"/>

  <!-- Iteration counter centre: staggered text elements simulate a counter.
       Each is visible for 1 second of the 6-second loop. -->
  <g text-anchor="middle">
    <text class="count c0" x="200" y="172">0</text>
    <text class="count c1" x="200" y="172">200</text>
    <text class="count c2" x="200" y="172">400</text>
    <text class="count c3" x="200" y="172">600</text>
    <text class="count c4" x="200" y="172">800</text>
    <text class="count c5" x="200" y="172">1000</text>
    <text class="sub" x="200" y="196">iterations</text>
  </g>

  <!-- Material design 'vpn_key' path, re-centred in a 48x48 viewport scaled
       around the ring centre. Appears + glows only at 100% progress. -->
  <g class="keyicon" transform="translate(176,146)">
    <!-- simplified key shape: circular bow + rectangular shank with teeth -->
    <circle cx="14" cy="24" r="10" fill="#fab387"/>
    <circle cx="14" cy="24" r="4"  fill="#1e1e2e"/>
    <rect   x="22" y="20" width="24" height="8" fill="#fab387"/>
    <rect   x="38" y="28" width="4"  height="6" fill="#fab387"/>
    <rect   x="30" y="28" width="4"  height="6" fill="#fab387"/>
  </g>
  <circle class="keyglow-ring" cx="200" cy="170" r="36"/>

  <!-- Legend / caption -->
  <text class="sub" x="200" y="295" text-anchor="middle">
    Derivation runs in the process pool via OffloadEngine.submit()
  </text>
  <text class="sub" x="200" y="315" text-anchor="middle" fill="#a6e3a1">
    on completion -&gt; ContainerUnlockedEvent published
  </text>
</svg>
