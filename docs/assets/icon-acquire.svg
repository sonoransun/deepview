<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     role="img"
     aria-labelledby="dv-icon-acquire-title dv-icon-acquire-desc"
     fill="currentColor">
  <title id="dv-icon-acquire-title">Acquire</title>
  <desc id="dv-icon-acquire-desc">A disk platter with a downward arrow, symbolising
  memory or disk acquisition: pulling bytes off live hardware or a frozen image
  into Deep View for analysis.</desc>
  <style>svg { color: #cba6f7; }</style>

  <!-- Outer disk platter -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor"
          stroke-width="2.5" opacity="0.9"/>
  <!-- Inner hub -->
  <circle cx="32" cy="32" r="4" fill="currentColor"/>
  <!-- Sector marks -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="currentColor"
          stroke-width="1" stroke-dasharray="2 3" opacity="0.6"/>

  <!-- Download arrow overlaid (center) -->
  <path d="M32 18 L32 38 M24 30 L32 38 L40 30"
        fill="none" stroke="currentColor" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line of arrow target -->
  <line x1="22" y1="46" x2="42" y2="46"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
</svg>
