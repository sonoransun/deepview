<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 32"
     role="img"
     aria-labelledby="dv-fav-title">
  <title id="dv-fav-title">Deep View</title>
  <!-- Catppuccin mocha: base #1e1e2e, mauve #cba6f7, teal #94e2d5, surface #45475a -->
  <rect width="32" height="32" rx="6" fill="#1e1e2e"/>
  <!-- Two data layers (simplified) -->
  <rect x="6" y="22" width="20" height="4" rx="1" fill="#45475a"/>
  <rect x="9" y="17" width="14" height="4" rx="1" fill="#6c7086"/>
  <!-- Lens handle -->
  <line x1="18" y1="13" x2="24" y2="19"
        stroke="#cba6f7" stroke-width="3" stroke-linecap="round"/>
  <!-- Lens ring -->
  <circle cx="14" cy="11" r="7"
          fill="#11111b" stroke="#cba6f7" stroke-width="2.2"/>
  <!-- Reticle dot -->
  <circle cx="14" cy="11" r="1.6" fill="#94e2d5"/>
</svg>
