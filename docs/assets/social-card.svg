<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     role="img"
     aria-labelledby="dv-social-title dv-social-desc">
  <title id="dv-social-title">Deep View — cross-platform forensics toolkit</title>
  <desc id="dv-social-desc">OpenGraph / Twitter-card artwork for Deep View. Features
  the project wordmark, tagline, and a miniature architecture motif showing data layers,
  trace events, and detection outputs flowing through a lens. Catppuccin mocha palette.</desc>

  <defs>
    <linearGradient id="sc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1e2e"/>
      <stop offset="60%"  stop-color="#181825"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="sc-lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#cba6f7"/>
      <stop offset="55%"  stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#94e2d5"/>
    </linearGradient>
    <radialGradient id="sc-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#cba6f7" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#cba6f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sc-bg)"/>
  <!-- Soft mauve glow behind the lens -->
  <circle cx="940" cy="315" r="340" fill="url(#sc-glow)"/>

  <!-- Decorative grid lines (hex address rail, very subtle) -->
  <g stroke="#45475a" stroke-opacity="0.18" stroke-width="1">
    <line x1="60"  y1="560" x2="1140" y2="560"/>
    <line x1="60"  y1="580" x2="1140" y2="580"/>
    <line x1="60"  y1="600" x2="1140" y2="600"/>
  </g>
  <g fill="#6c7086" font-family="JetBrains Mono, monospace" font-size="12" opacity="0.35">
    <text x="60"   y="556">0x00000000</text>
    <text x="1040" y="556">0xffffffff</text>
  </g>

  <!-- Architecture motif on the right: layers + lens -->
  <g transform="translate(720 150)">
    <!-- Data-layer stack -->
    <rect x="0"  y="210" width="380" height="32" rx="4" fill="#313244"/>
    <rect x="20" y="170" width="340" height="32" rx="4" fill="#45475a"/>
    <rect x="40" y="130" width="300" height="32" rx="4" fill="#585b70"/>
    <rect x="60" y="90"  width="260" height="32" rx="4" fill="#6c7086"/>

    <!-- Event dots streaming right -->
    <g fill="#94e2d5">
      <circle cx="385" cy="226" r="4"/>
      <circle cx="400" cy="226" r="3" opacity="0.7"/>
      <circle cx="415" cy="226" r="2" opacity="0.4"/>
    </g>
    <g fill="#f5c2e7">
      <circle cx="365" cy="186" r="4"/>
      <circle cx="380" cy="186" r="3" opacity="0.7"/>
      <circle cx="395" cy="186" r="2" opacity="0.4"/>
    </g>
    <g fill="#89b4fa">
      <circle cx="345" cy="146" r="4"/>
      <circle cx="360" cy="146" r="3" opacity="0.7"/>
      <circle cx="375" cy="146" r="2" opacity="0.4"/>
    </g>

    <!-- Magnifying glass -->
    <g transform="translate(30 -20)">
      <line x1="160" y1="160" x2="210" y2="210"
            stroke="#cba6f7" stroke-width="18" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="80"
              fill="#11111b" fill-opacity="0.85"
              stroke="url(#sc-lens)" stroke-width="9"/>
      <line x1="100" y1="40"  x2="100" y2="160"
            stroke="#94e2d5" stroke-width="1" stroke-opacity="0.55"/>
      <line x1="40"  y1="100" x2="160" y2="100"
            stroke="#94e2d5" stroke-width="1" stroke-opacity="0.55"/>
      <circle cx="100" cy="100" r="26" fill="none"
              stroke="#94e2d5" stroke-width="1" stroke-opacity="0.55"/>
      <circle cx="100" cy="100" r="4" fill="#94e2d5"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, sans-serif" fill="#cdd6f4">
    <text x="80" y="230" font-size="108" font-weight="800" letter-spacing="-2">
      Deep <tspan fill="#cba6f7">View</tspan>
    </text>
    <text x="84" y="290" font-size="30" font-weight="500" fill="#a6adc8">
      Cross-platform forensics &amp; runtime analysis
    </text>
    <text x="84" y="335" font-size="22" font-weight="400" fill="#7f849c">
      memory &#183; tracing &#183; instrumentation &#183; detection &#183; reporting
    </text>
  </g>

  <!-- Bottom-left meta strip -->
  <g font-family="JetBrains Mono, monospace" fill="#6c7086" font-size="18">
    <text x="80" y="540">$ pip install deepview</text>
    <text x="80" y="570" fill="#94e2d5">$ <tspan fill="#cba6f7">deepview</tspan> doctor</text>
  </g>
</svg>
