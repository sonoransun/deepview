<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     role="img"
     aria-labelledby="dv-logo-title dv-logo-desc">
  <title id="dv-logo-title">Deep View</title>
  <desc id="dv-logo-desc">A stylised magnifying-glass lens hovering over a stack of
  horizontal data layers, rendered in the catppuccin mocha palette. The lens symbolises
  forensic inspection; the layers below represent Deep View's Volatility-inspired
  byte-addressable DataLayer stack.</desc>

  <!-- Catppuccin Mocha palette used throughout:
       base    #1e1e2e
       mantle  #181825
       crust   #11111b
       surface #313244
       text    #cdd6f4
       mauve   #cba6f7  (primary)
       teal    #94e2d5
       blue    #89b4fa
       sapphire#74c7ec
       pink    #f5c2e7
       yellow  #f9e2af
  -->

  <defs>
    <linearGradient id="dv-lens-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#cba6f7"/>
      <stop offset="55%"  stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#94e2d5"/>
    </linearGradient>

    <linearGradient id="dv-glass-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e1e2e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#11111b" stop-opacity="0.95"/>
    </linearGradient>

    <radialGradient id="dv-glass-highlight" cx="0.35" cy="0.3" r="0.35">
      <stop offset="0%"   stop-color="#f5c2e7" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#cba6f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="dv-layer-1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#313244"/>
      <stop offset="100%" stop-color="#45475a"/>
    </linearGradient>
    <linearGradient id="dv-layer-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#45475a"/>
      <stop offset="100%" stop-color="#585b70"/>
    </linearGradient>
    <linearGradient id="dv-layer-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#585b70"/>
      <stop offset="100%" stop-color="#6c7086"/>
    </linearGradient>
    <linearGradient id="dv-layer-4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6c7086"/>
      <stop offset="100%" stop-color="#7f849c"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="256" height="256" rx="40" ry="40" fill="#1e1e2e"/>

  <!-- Subtle inner frame -->
  <rect x="8" y="8" width="240" height="240" rx="34" ry="34"
        fill="none" stroke="#cba6f7" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Data-layer stack (bottom of the mark) -->
  <g>
    <rect x="44" y="188" width="168" height="16" rx="3" fill="url(#dv-layer-4)"/>
    <rect x="52" y="168" width="152" height="16" rx="3" fill="url(#dv-layer-3)"/>
    <rect x="60" y="148" width="136" height="16" rx="3" fill="url(#dv-layer-2)"/>
    <rect x="68" y="128" width="120" height="16" rx="3" fill="url(#dv-layer-1)"/>

    <!-- Address markers (little dots on the right edge of each layer) -->
    <circle cx="200" cy="136" r="2" fill="#cba6f7"/>
    <circle cx="192" cy="156" r="2" fill="#89b4fa"/>
    <circle cx="184" cy="176" r="2" fill="#94e2d5"/>
    <circle cx="176" cy="196" r="2" fill="#f5c2e7"/>
  </g>

  <!-- Magnifying glass: positioned upper-left, inspecting the layers -->
  <g transform="translate(36 36)">
    <!-- Handle (underneath the lens) -->
    <line x1="116" y1="116" x2="150" y2="150"
          stroke="#cba6f7" stroke-width="14" stroke-linecap="round"/>
    <line x1="116" y1="116" x2="150" y2="150"
          stroke="#f5c2e7" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <!-- Lens ring -->
    <circle cx="68" cy="68" r="56" fill="url(#dv-glass-grad)"
            stroke="url(#dv-lens-grad)" stroke-width="7"/>

    <!-- Glass highlight -->
    <circle cx="68" cy="68" r="50" fill="url(#dv-glass-highlight)"/>

    <!-- Crosshair reticle inside the lens -->
    <line x1="68" y1="28" x2="68" y2="108"
          stroke="#94e2d5" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="28" y1="68" x2="108" y2="68"
          stroke="#94e2d5" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="68" cy="68" r="18" fill="none"
            stroke="#94e2d5" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="68" cy="68" r="3" fill="#94e2d5"/>
  </g>
</svg>
